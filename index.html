<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body{
      background-color: hsl(212, 45%, 89%);
      font-family: Outfit;
    }
    .main_container{
      background-color: hsl(0, 0%, 100%);
      border-radius:5px ;
      width:22%;
      margin:20px auto;
      padding: 2px;
      box-shadow:inset;
    }
    .bold_text{
      color:  hsl(218, 44%, 22%);
      text-align: center;
      font-weight: 700;
    }
    .light_text{
      color: hsl(216, 15%, 48%);
      text-align: center;
      font-weight:400;
    }
    img{
      display: block;
      width:204px;
      height:194px;
      border-radius:4px ;
      margin:9px auto;
    }
    @media(max-width:600px){
      .main_container{
      background-color: hsl(0, 0%, 100%);
      border-radius:5px ;
      width:90%;
      margin:20px auto;
      padding: 2px;
      box-shadow:inset;
    }
     img{
      display: block;
      width:90%;
      
      border-radius:4px ;
      margin:9px auto;
    }

    }
    nav{
      background-color: rgb(51, 143, 242);
      display:flex;
      gap:10px;
      text-align: center;
      padding: 10px;

    }
    nav>a{
      display:block;
      color:white;
      text-decoration: none;
      width:20%;
      padding:2px;
    }
    nav>a:hover{
      border-radius: 7px;
      background-color: white;
      color: rgb(51, 143, 242);
      padding:2px;
    }
  </style>
</head>
<body>
  <nav>
    <a href="#">Home</a>
    <a href="#">Contact</a>
    <a href="#">About Us</a>
    <a href="#">Premium</a>
  </nav>
  <div class="main_container">
    <img src="images/image-qr-code.png" alt="QR image">
    <div>
      <p class="bold_text">  Improve your front-end skills by building projects</p>
      <p class="light_text">   Scan the QR code to visit Frontend Mentor and take your coding skills to  the next level</p>
    </div>
  </div>




  
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Rachael</a>.
  </div>
</body>
</html>
